{% extends "barra_usuario.html" %}
{% block contenedor %}

<div class="container mt-5">

  <!-- Encabezado -->
  <div class="p-3 text-center text-light rounded-3 shadow mb-4"
       style="background: linear-gradient(90deg, var(--bs-success), var(--bs-teal));">
    <h2 class="m-0 fw-bold"><i class="bi bi-geo-alt me-2"></i>Actualizar Pedido</h2>
  </div>

  <div class="row justify-content-center">

    <!-- Formulario -->
    <div class="col-md-8">
      <div class="card shadow border-0 rounded-4">
        <div class="card-body p-4">
          <h5 class="fw-bold mb-4 text-success">
            <i class="bi bi-pencil-square me-2"></i>Editar Datos del Pedido
          </h5>

          <form method="POST" action="/logica_actualizar_pedido_usuario/"> {% csrf_token %}

            <div class="row g-3 mb-3">
              <div class="col-md-6">
                <label for="TxtId" class="form-label fw-semibold">
                  <i class="bi bi-hash me-1 text-success"></i>Id
                </label>
                <input type="text" class="form-control border-0 shadow-sm bg-light"
                       id="TxtId" name="TxtId"
                       placeholder="ID del pedido"
                       required value="{{ realizar_pedido.Id_Realizar_Pedido }}">
              </div>
              <div class="col-md-6">
                <label for="TxtNombreDistrito" class="form-label fw-semibold">
                  <i class="bi bi-bag me-1 text-success"></i>NOMBRE PEDIDO
                </label>
                <input type="text" class="form-control border-0 shadow-sm bg-light"
                       id="TxtNombreDistrito" name="TxtNombreDistrito"
                       placeholder="Nombre del pedido"
                       required value="{{ realizar_pedido.Nombre_Realizar_Pedido }}">
              </div>
            </div>

            <div class="mb-3">
              <label for="TxtUbicacionExacta" class="form-label fw-semibold">
                <i class="bi bi-geo-alt me-1 text-danger"></i>DIRECCIÓN EXACTA
              </label>
              <input type="text" class="form-control border-0 shadow-sm bg-light"
                     id="TxtUbicacionExacta" name="TxtUbicacionExacta"
                     placeholder="Ej: Av. Los Olivos 123, Lima"
                     required value="{{ realizar_pedido.Dirrecion_Realizar_Pedido }}">
            </div>

            <div class="row g-3 mb-3">
              <div class="col-md-6">
                <label for="TxtCantidad" class="form-label fw-semibold">
                  <i class="bi bi-calendar-event me-1 text-success"></i>FECHA
                </label>
                <input type="date" class="form-control border-0 shadow-sm bg-light"
                       id="TxtCantidad" name="TxtCantidad"
                       required value="{{ realizar_pedido.Fecha_Realizar_Pedido }}">
              </div>
              <div class="col-md-6">
                <label for="TxtPrecios" class="form-label fw-semibold">
                  <i class="bi bi-clock me-1 text-success"></i>HORA
                </label>
                <input type="time" class="form-control border-0 shadow-sm bg-light"
                       id="TxtPrecios" name="TxtPrecios"
                       required value="{{ realizar_pedido.Hora_Realizar_Pedido }}">
              </div>
            </div>

            <div class="row g-3 mb-4">
              <div class="col-md-6">
                <label for="TxtFecha" class="form-label fw-semibold">
                  <i class="bi bi-credit-card me-1 text-primary"></i>MÉTODO PAGO
                </label>
                <input type="text" class="form-control border-0 shadow-sm bg-light"
                       id="TxtFecha" name="TxtFecha"
                       placeholder="Ej: Yape, Efectivo, Plin"
                       required value="{{ realizar_pedido.Metodo_Pago_Realizar_Pedido }}">
              </div>
              <div class="col-md-6">
                <label for="TxtHora" class="form-label fw-semibold">
                  <i class="bi bi-chat-left-text me-1 text-warning"></i>OBSERVACIÓN
                </label>
                <input type="text" class="form-control border-0 shadow-sm bg-light"
                       id="TxtHora" name="TxtHora"
                       placeholder="Alguna indicación adicional"
                       required value="{{ realizar_pedido.Observacion_Realizar_Pedido }}">
              </div>
            </div>

            <div class="d-flex gap-3">
              <button type="submit" class="btn fw-bold w-100 text-white shadow-sm"
                      style="background: linear-gradient(90deg, var(--bs-success), var(--bs-teal)); border: none;">
                <i class="bi bi-check-circle me-2"></i>Guardar Cambios
              </button>
              <a href="/enlace_tabla_realizar_pedido_usuario/" class="btn btn-outline-secondary fw-bold px-4 shadow-sm">
                <i class="bi bi-x-circle me-1"></i>Cancelar
              </a>
            </div>

          </form>
        </div>
      </div>
    </div>

  </div>
</div>

{% endblock contenedor %}
