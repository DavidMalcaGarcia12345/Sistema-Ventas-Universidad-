<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistema Control Ventas Tambo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  </head>
  <body class="bg-light">

    <!-- Barra de navegación -->
    <nav class="navbar navbar-expand-lg text-light shadow"
         style="background: linear-gradient(90deg, var(--bs-success), var(--bs-teal));">
      <div class="container-fluid">

        <!-- Logo / Título -->
        <a class="navbar-brand text-light fw-bold" href="/enlace_panel_usuario/">
          🛒 Tambo - Usuario
        </a>

        <!-- Botón hamburguesa (móvil) -->
        <button class="navbar-toggler bg-dark" type="button" 
                data-bs-toggle="collapse" data-bs-target="#menuUsuario">
          <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
        </button>

        <!-- Links del menú -->
        <div class="collapse navbar-collapse" id="menuUsuario">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">

            <li class="nav-item">
              <a class="nav-link text-light fw-semibold" href="/enlace_registrar_compras_usuario/">
                <i class="bi bi-bag-check me-1"></i>Registrar Mis Compras
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link text-light fw-semibold" href="/enlace_tabla_producto_disponible/">
                <i class="bi bi-grid me-1"></i>Productos Disponibles
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link text-light fw-semibold" href="/enlace_registrar_realizar_compras/">
                <i class="bi bi-cart-plus me-1"></i>Registrar Ubicacion
              </a>
            </li>

            {% comment %} <li class="nav-item">
              <a class="nav-link text-light fw-semibold" href="#">
                <i class="bi bi-clock-history me-1"></i>Estado de Pedidos
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link text-light fw-semibold" href="#">
                <i class="bi bi-person-circle me-1"></i>Mi Perfil
              </a>
            </li> {% endcomment %}

          </ul>

          <!-- Botón Cerrar Sesión -->
          <a href="/" class="btn btn-light fw-bold text-success">
            <i class="bi bi-box-arrow-right me-1"></i>Cerrar Sesión
          </a>
        </div>

      </div>
    </nav>

    <!-- Contenido de cada página -->
    {% block contenedor %}
    {% endblock contenedor %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
