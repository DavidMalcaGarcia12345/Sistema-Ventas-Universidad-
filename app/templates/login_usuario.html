<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistema Control Ventas Tambo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">

    <!-- Encabezado -->
    <div class="container my-5">
      <div class="p-4 text-center text-light rounded-4 shadow" 
           style="background: linear-gradient(90deg, var(--bs-purple), var(--bs-indigo));">
        <h1 class="m-0 fw-bold">SISTEMA CONTROL DE VENTAS TAMBO</h1>
      </div>
    </div>

    <!-- Formulario -->
    <div class="container my-5">
      <div class="card shadow-lg border-0 rounded-4">
        <div class="card-body p-4">
          <h4 class="text-center mb-4 text-primary">Ingresar al sistema</h4>

          <form method="POST" action="">
            {% csrf_token %}

            {% if error %}
              <div class="alert alert-danger text-center fw-bold rounded-3" role="alert">
                ⚠️ {{ error }}
              </div>
            {% endif %}

            <div class="mb-3">
              <label class="form-label fw-bold">Usuario :</label>
              <input type="text" name="usuario" class="form-control" placeholder="Ingrese su usuario" required>
            </div>
            <div class="mb-3">
              <label class="form-label fw-bold">Contraseña :</label>
              <input type="password" name="contrasena" class="form-control" placeholder="Ingrese su contraseña" required>
            </div>
            <button type="submit"
               class="btn w-100 text-light fw-bold" 
               style="background-color: var(--bs-purple);">
               Ingresar
            </button>
          </form>

        </div>
      </div>
    </div>

    <!-- Mapa -->
    <div class="container my-5">
      <div class="rounded-4 shadow overflow-hidden">
        <iframe 
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d4345.477431178597!2d-77.0696208!3d-11.9533001!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x9105cffa7d29ceaf%3A0x82f1841b635a714c!2sTambo%20Uc!5e1!3m2!1ses-419!2spe!4v1774486449869!5m2!1ses-419!2spe" 
          width="100%" 
          height="450" 
          style="border:0;" 
          allowfullscreen 
          loading="lazy">
        </iframe>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
