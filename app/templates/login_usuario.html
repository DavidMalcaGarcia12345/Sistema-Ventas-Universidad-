<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistema Control Ventas Tambo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">

    <!-- Encabezado -->
    <div class="container my-5">
      <div class="p-4 text-center text-light rounded-4 shadow bg-danger" >
        <h1 class="m-0 fw-bold">SISTEMA CONTROL DE VENTAS VEGA</h1>
      </div>
    </div>

    <!-- Formulario -->
    <div class="container my-5">
      <div class="card shadow-lg border-0 rounded-4">
        <div class="card-body p-4">
          <h4 class="text-center mb-4 text-dark">Ingresar al sistema</h4>

          <form method="POST" action="">
            {% csrf_token %}

            {% if error %}
              <div class="alert alert-danger text-center fw-bold rounded-3" role="alert">
                ⚠️ {{ error }}
              </div>
            {% endif %}

            <div class="mb-3">
              <label class="form-label fw-bold">Usuario :</label>
              <input type="text" name="usuario" class="form-control" placeholder="Ingrese su usuario" required>
            </div>
            <div class="mb-3">
              <label class="form-label fw-bold">Contraseña :</label>
              <input type="password" name="contrasena" class="form-control" placeholder="Ingrese su contraseña" required>
            </div>
            <button type="submit"
               class="btn w-100 text-light fw-bold bg-danger">
               Ingresar
            </button>
          </form>

        </div>
      </div>
    </div>

    <!-- Mapa -->
    <div class="container my-5">
      <div class="rounded-4 shadow overflow-hidden">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d6140.280212954813!2d-77.0123832430062!3d-11.863241491926434!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x9105da00440c42c3%3A0x4a9825ef226aba50!2sVega%20Supermayorista%20San%20Antonio!5e1!3m2!1ses-419!2spe!4v1784602863513!5m2!1ses-419!2spe" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="strict-origin-when-cross-origin"></iframe>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
